<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Kudi · panell</title>
    <style>
      :root {
        --brand: #ff8201;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family:
          Inter, ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji";
        background: #fff7ef;
        color: #2a2118;
        padding: 1.5rem;
      }
      header {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        border-bottom: 3px solid var(--brand);
        padding-bottom: 0.8rem;
        margin-bottom: 1.2rem;
      }
      h1 {
        font-family: "Londrina Solid", Inter, system-ui, sans-serif;
        color: var(--brand);
        margin: 0;
        font-size: 1.8rem;
      }
      .badge {
        margin-left: auto;
        font-size: 0.75rem;
        background: var(--brand);
        color: #fff;
        border-radius: 999px;
        padding: 0.15rem 0.7rem;
      }
      section {
        background: #fff;
        border: 1px solid #f0dcc6;
        border-radius: 14px;
        padding: 1rem 1.2rem;
        margin-bottom: 1rem;
        max-width: 42rem;
      }
      code {
        background: #ffe9d2;
        border-radius: 6px;
        padding: 0.1rem 0.35rem;
        font-size: 0.85em;
      }
      #status {
        font-size: 0.85rem;
        color: #7a6a58;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Panell d'en Kudi</h1>
      <span class="badge">placeholder</span>
    </header>
    <section>
      <p>
        Aquest és el marcador de posició del panell d'administració. La SPA de
        la safata d'entrada (converses, coneixement, simulador) arriba en una
        fase posterior.
      </p>
      <p id="status">Comprovant l'API…</p>
    </section>
    <script>
      // Tiny smoke test that the admin API + Access gate are wired.
      fetch("/admin/api/health")
        .then((r) => r.json().then((j) => ({ ok: r.ok, j })))
        .then(({ ok, j }) => {
          const el = document.getElementById("status");
          el.textContent = ok
            ? "API viva ✅ " + JSON.stringify(j)
            : "API protegida 🔒 " + JSON.stringify(j);
        })
        .catch((e) => {
          document.getElementById("status").textContent =
            "No s'ha pogut contactar l'API: " + e;
        });
    </script>
  </body>
</html>
